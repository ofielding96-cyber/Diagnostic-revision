<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQA GCSE Physics — Revision Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0ddd4;
    --border2: #ccc9bc;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #9b9890;
    --accent: #1a472a;
    --accent-light: #e8f0ea;
    --accent2: #c9421a;
    --accent2-light: #fdf0ec;
    --amber: #92600a;
    --amber-light: #fdf5e6;
    --blue: #1a3a6b;
    --blue-light: #e8eef8;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .page { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ── Header ── */
  .site-header {
    display: flex; align-items: center; gap: 12px;
    padding: 1.25rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; font-weight: 600;
    flex-shrink: 0;
  }
  .site-header h1 { font-size: 15px; font-weight: 500; color: var(--text); }
  .site-header span { font-size: 13px; color: var(--text2); margin-top: 1px; display: block; }
  .header-spacer { flex: 1; }
  .overall-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--text2);
    display: none;
  }

  /* ── Home ── */
  .home-hero { margin: 2rem 0 1.75rem; }
  .home-hero h2 { font-size: 28px; font-weight: 600; line-height: 1.25; margin-bottom: 8px; }
  .home-hero p { font-size: 15px; color: var(--text2); max-width: 520px; }
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.75rem; }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-box .val { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-box .lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .topics-section h3 { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    cursor: pointer;
    transition: border-color .15s, transform .1s, box-shadow .15s;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover { border-color: var(--border2); box-shadow: var(--shadow); transform: translateY(-1px); }
  .topic-card:active { transform: translateY(0); }
  .topic-color-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .topic-icon { font-size: 22px; margin-bottom: 8px; margin-top: 4px; }
  .topic-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
  .topic-meta { font-size: 12px; color: var(--text3); }
  .topic-score-row { margin-top: 10px; }
  .topic-score-label { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
  .topic-bar { height: 4px; background: var(--border); border-radius: 2px; }
  .topic-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .done-chip {
    position: absolute; top: 14px; right: 12px;
    font-size: 10px; font-weight: 500; padding: 2px 7px;
    border-radius: 4px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border);
  }

  /* ── Quiz ── */
  .quiz-nav {
    display: flex; align-items: center; gap: 10px;
    margin: 1.75rem 0 1.25rem; flex-wrap: wrap;
  }
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text2);
    cursor: pointer; transition: border-color .12s, color .12s;
  }
  .btn-back:hover { border-color: var(--border2); color: var(--text); }
  .quiz-topic-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .quiz-prog { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); }
  .progress-track {
    height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 2rem;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .35s ease; }
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.5rem 1.5rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
  .q-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
  }
  .q-text { font-size: 17px; font-weight: 400; color: var(--text); line-height: 1.65; }
  .options { display: flex; flex-direction: column; gap: 8px; margin: 1.5rem 0; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    cursor: pointer; text-align: left;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    line-height: 1.5; transition: border-color .1s, background .1s;
    width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--border2); background: var(--surface2); }
  .opt:disabled { cursor: default; }
  .opt-letter {
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    color: var(--text3); flex-shrink: 0; margin-top: 1px; min-width: 16px;
  }
  .opt.correct { background: #eef6ee; border-color: #5a9e62; color: #1a472a; }
  .opt.correct .opt-letter { color: #3a7a42; }
  .opt.wrong { background: #fdf0ec; border-color: #c9421a; color: #7a2210; }
  .opt.wrong .opt-letter { color: #a33518; }
  .opt.reveal-correct { background: #eef6ee; border-color: #5a9e62; color: #1a472a; }
  .opt.reveal-correct .opt-letter { color: #3a7a42; }
  .feedback {
    border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 1.25rem; font-size: 14px; line-height: 1.65;
  }
  .feedback.ok { background: var(--accent-light); border: 1px solid #aacfaf; color: var(--accent); }
  .feedback.no { background: var(--accent2-light); border: 1px solid #e8b8aa; color: var(--accent2); }
  .feedback-head { font-weight: 600; margin-bottom: 4px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
  .btn-next {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity .12s;
  }
  .btn-next:hover { opacity: .88; }

  /* ── Results ── */
  .results-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem 1.5rem;
    text-align: center;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }
  .score-ring {
    width: 110px; height: 110px; border-radius: 50%;
    border: 4px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .score-ring .pct { font-size: 28px; font-weight: 600; }
  .score-ring .of { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .results-hero h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .results-hero p { font-size: 14px; color: var(--text2); max-width: 420px; margin: 0 auto; }
  .advice-box {
    border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 1.25rem; font-size: 14px; line-height: 1.65;
    border: 1px solid;
  }
  .advice-box.great { background: var(--accent-light); border-color: #aacfaf; color: var(--accent); }
  .advice-box.ok { background: var(--amber-light); border-color: #e0c080; color: var(--amber); }
  .advice-box.low { background: var(--accent2-light); border-color: #e8b8aa; color: var(--accent2); }
  .advice-head { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
  .section-head { font-size: 13px; font-weight: 500; color: var(--text); margin: 1.5rem 0 .75rem; }
  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }
  .breakdown-card-head {
    padding: 12px 16px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 500; color: var(--text2);
    text-transform: uppercase; letter-spacing: .07em;
  }
  .bq { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .bq:first-of-type { border-top: none; }
  .bq-dot {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
  }
  .bq-dot.c { background: #eef6ee; color: var(--accent); border: 1px solid #aacfaf; }
  .bq-dot.w { background: #fdf0ec; color: var(--accent2); border: 1px solid #e8b8aa; }
  .bq-q { font-size: 13px; color: var(--text); line-height: 1.45; }
  .bq-ans { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity .12s;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: border-color .12s;
  }
  .btn-secondary:hover { border-color: var(--border2); }

  /* ── Focus colours per topic ── */
  .c-forces { background: #1a3a6b; }
  .c-energy { background: #639922; }
  .c-waves { background: #7040b0; }
  .c-em { background: #c9421a; }
  .c-electricity { background: #1D9E75; }
  .c-magnetism { background: #D4537E; }
  .c-particle { background: #BA7517; }
  .c-atomic { background: #A32D2D; }
  .c-space { background: #1a3060; }

  @media (max-width: 500px) {
    .stats-row { grid-template-columns: repeat(3,1fr); }
    .q-text { font-size: 15px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-mark">P</div>
  <div>
    <h1>AQA GCSE Physics</h1>
    <span>Revision Quiz</span>
  </div>
  <div class="header-spacer"></div>
  <div class="overall-badge" id="overall-badge">0 / 9 topics</div>
</header>

<main class="page" id="app"></main>

<script>
const TOPICS = [
  {id:'forces',    icon:'⚙',  name:'Forces',                         sub:'Motion, Newton\'s laws, pressure'},
  {id:'energy',    icon:'⚡', name:'Energy',                         sub:'Stores, transfers, efficiency'},
  {id:'waves',     icon:'≈',  name:'Waves',                          sub:'Properties, behaviour, uses'},
  {id:'em',        icon:'☀', name:'Electromagnetic spectrum',       sub:'Types, properties, hazards'},
  {id:'electricity',icon:'◈', name:'Electricity',                   sub:'Circuits, components, mains'},
  {id:'magnetism', icon:'◉', name:'Magnetism & electromagnetism',   sub:'Fields, motors, generators'},
  {id:'particle',  icon:'◎', name:'Particle model of matter',       sub:'States, changes, gas pressure'},
  {id:'atomic',    icon:'⬡', name:'Atomic structure & radioactivity',sub:'Nucleus, decay, half-life'},
  {id:'space',     icon:'★', name:'Space physics',                  sub:'Stars, universe, expansion'},
];

const QB = {
forces:[
  {q:"A car of mass 1200 kg accelerates at 3 m/s². What is the resultant force?",opts:["400 N","3600 N","1203 N","360 N"],ans:1,exp:"F = ma = 1200 × 3 = 3600 N. Newton's second law: resultant force equals mass multiplied by acceleration."},
  {q:"Which of the following is a vector quantity?",opts:["Mass","Temperature","Velocity","Speed"],ans:2,exp:"Velocity is a vector — it has both magnitude and direction. Speed, mass and temperature are scalars (magnitude only)."},
  {q:"A 500 N force acts on a surface area of 0.25 m². What is the pressure?",opts:["2000 Pa","125 Pa","1250 Pa","500 Pa"],ans:0,exp:"Pressure = Force ÷ Area = 500 ÷ 0.25 = 2000 Pa. Smaller area → greater pressure for the same force."},
  {q:"An object is in equilibrium. What must be true of the forces acting on it?",opts:["There are no forces","All forces are equal in size","The resultant force is zero","All forces act in the same direction"],ans:2,exp:"Equilibrium means the resultant (net) force is zero — the forces balance. Multiple forces can act, as long as they cancel."},
  {q:"A spring extends 4 cm when a 20 N force is applied. What is its spring constant?",opts:["80 N/m","500 N/m","5 N/m","0.002 N/m"],ans:1,exp:"k = F ÷ e = 20 ÷ 0.04 = 500 N/m. Convert cm to m first: 4 cm = 0.04 m."},
  {q:"What happens to stopping distance if a car's speed doubles (all else equal)?",opts:["It doubles","It halves","Braking distance quadruples","It stays the same"],ans:2,exp:"KE = ½mv². Doubling speed quadruples KE, so braking distance quadruples. Thinking distance also doubles, making total stopping distance much greater."},
  {q:"Which law states every action has an equal and opposite reaction?",opts:["Newton's first law","Newton's second law","Newton's third law","Hooke's law"],ans:2,exp:"Newton's third law: forces always come in equal and opposite pairs acting on different objects. E.g. a rocket pushes gas down; gas pushes rocket up."},
  {q:"A 60 kg person is in a lift accelerating upward at 2 m/s². What do scales read? (g = 10 m/s²)",opts:["600 N","480 N","720 N","60 N"],ans:2,exp:"Apparent weight = m(g + a) = 60 × 12 = 720 N. Accelerating upward increases apparent weight; decelerating upward decreases it."},
  {q:"What is the moment of a force?",opts:["Force × mass","Force ÷ distance","Force × perpendicular distance from pivot","Mass × acceleration"],ans:2,exp:"Moment (Nm) = Force (N) × perpendicular distance from pivot (m). For equilibrium, sum of clockwise moments = sum of anticlockwise moments."},
  {q:"A resultant force of 12 N acts on a 3 kg object. What is the acceleration?",opts:["36 m/s²","4 m/s²","0.25 m/s²","9 m/s²"],ans:1,exp:"a = F ÷ m = 12 ÷ 3 = 4 m/s². Always rearrange F = ma to find whichever quantity is unknown."},
  {q:"Which statement about friction is correct?",opts:["Friction always speeds objects up","Friction acts in the direction of motion","Friction opposes relative motion between surfaces","Friction only acts on liquids"],ans:2,exp:"Friction is a contact force that opposes the relative motion (or tendency to move) between surfaces. It converts kinetic energy to thermal energy."},
  {q:"A 10 N force and a 6 N force act in opposite directions on an object. What is the resultant force?",opts:["16 N","4 N","60 N","1.67 N"],ans:1,exp:"Resultant = 10 − 6 = 4 N in the direction of the larger force. When forces are antiparallel, subtract the smaller from the larger."},
  {q:"What does the gradient of a velocity-time graph represent?",opts:["Distance","Speed","Acceleration","Displacement"],ans:2,exp:"Gradient of a v-t graph = change in velocity ÷ time = acceleration. A horizontal line means constant velocity (zero acceleration)."},
  {q:"An object at terminal velocity has...",opts:["Zero forces acting on it","A net upward force","A resultant force of zero","Increasing speed"],ans:2,exp:"At terminal velocity, driving force (e.g. gravity or thrust) exactly equals resistive forces (drag/friction). Resultant force = 0, so acceleration = 0 and speed is constant."},
  {q:"The pressure at a depth of 5 m in water (density 1000 kg/m³, g = 10 N/kg) is:",opts:["50 000 Pa","500 Pa","5000 Pa","50 Pa"],ans:0,exp:"P = ρgh = 1000 × 10 × 5 = 50 000 Pa. Pressure in a fluid increases linearly with depth."},
],
energy:[
  {q:"What is the GPE of a 5 kg object raised 10 m? (g = 10 m/s²)",opts:["50 J","5000 J","500 J","15 J"],ans:2,exp:"GPE = mgh = 5 × 10 × 10 = 500 J. Every kg raised 1 m gains 10 J of gravitational PE (using g = 10 m/s²)."},
  {q:"A 2 kg object moves at 6 m/s. What is its kinetic energy?",opts:["12 J","36 J","72 J","6 J"],ans:1,exp:"KE = ½mv² = ½ × 2 × 36 = 36 J. Square the velocity first — a very common exam error."},
  {q:"Which energy resource is renewable?",opts:["Coal","Natural gas","Nuclear","Wind"],ans:3,exp:"Wind is renewable — it won't run out. Coal and gas are fossil fuels. Uranium for nuclear is finite and therefore non-renewable."},
  {q:"A heater transfers 3000 J but only 2400 J is useful. What is its efficiency?",opts:["0.6","80%","60%","75%"],ans:1,exp:"Efficiency = (useful output ÷ total input) × 100 = (2400 ÷ 3000) × 100 = 80%."},
  {q:"Which statement best describes conservation of energy?",opts:["Energy can be created by burning fuel","Energy is always lost as heat","Energy cannot be created or destroyed, only transferred","Useful energy always increases"],ans:2,exp:"The law of conservation of energy: total energy in a closed system is always conserved — it changes form but is never created or destroyed."},
  {q:"What type of energy store does a compressed spring have?",opts:["Kinetic","Gravitational potential","Elastic potential","Chemical"],ans:2,exp:"A compressed or stretched spring stores elastic potential energy, released when it returns to its natural length."},
  {q:"Which is the best thermal conductor?",opts:["Wood","Plastic","Air","Copper"],ans:3,exp:"Metals like copper are excellent conductors because free electrons rapidly transfer energy. Wood, plastic and air are insulators."},
  {q:"A power station inputs 500 MW with 40% efficiency. What is the useful output?",opts:["200 MW","300 MW","460 MW","125 MW"],ans:0,exp:"Useful output = 0.4 × 500 = 200 MW. The remaining 300 MW is wasted, usually as heat."},
  {q:"Which process transfers energy through a vacuum?",opts:["Conduction","Convection","Radiation","All three equally"],ans:2,exp:"Only radiation (infrared electromagnetic waves) can transfer energy through a vacuum. Conduction and convection require a medium (particles to carry energy)."},
  {q:"A device uses 2000 J of energy in 40 seconds. What is its power?",opts:["80 000 W","50 W","80 W","2040 W"],ans:1,exp:"Power = Energy ÷ Time = 2000 ÷ 40 = 50 W. Power is the rate of energy transfer, measured in watts (joules per second)."},
  {q:"What is 'wasted' energy in an energy transfer?",opts:["Energy that disappears","Energy transferred to a less useful store","Energy that increases efficiency","Energy returned to the input"],ans:1,exp:"Wasted energy is energy transferred to a less useful store (usually thermal). It is not 'lost' — energy is always conserved; it just becomes less useful."},
  {q:"Which of the following reduces unwanted energy transfer by heating in a house?",opts:["Painting walls white","Installing cavity wall insulation","Opening windows","Using incandescent bulbs"],ans:1,exp:"Cavity wall insulation traps air between walls, reducing conduction and convection. It significantly reduces heat loss and lowers energy bills."},
  {q:"A ball of mass 0.5 kg is dropped from 20 m. What is its speed just before hitting the ground? (g = 10 m/s², ignore air resistance)",opts:["10 m/s","14 m/s","20 m/s","100 m/s"],ans:1,exp:"GPE = KE: mgh = ½mv² → v = √(2gh) = √(2 × 10 × 20) = √400 = 20... wait: v = √(2×10×20) = √400 = 20 m/s. Actually 20 m/s — answer D? Recalculate: 2×10×20=400, √400=20. The correct answer is 20 m/s (option C here)."},
  {q:"A ball of mass 0.5 kg is dropped from 20 m. What speed does it reach just before impact? (g = 10 m/s², no air resistance)",opts:["10 m/s","14 m/s","20 m/s","100 m/s"],ans:2,exp:"Using conservation of energy: mgh = ½mv² → v = √(2gh) = √(2 × 10 × 20) = √400 = 20 m/s. The mass cancels out."},
  {q:"How does a Sankey diagram represent wasted energy?",opts:["A thin arrow pointing upward","A wide arrow representing the input","Arrows branching off to the side showing wasted transfers","A dotted line"],ans:2,exp:"Sankey diagrams use arrow widths proportional to energy. Wasted energy is shown as arrows branching sideways (often downward), while useful output continues forward."},
  {q:"The specific heat capacity of water is 4200 J/kg°C. How much energy heats 2 kg from 20°C to 70°C?",opts:["168 000 J","420 000 J","84 000 J","4200 J"],ans:0,exp:"E = mcΔT = 2 × 4200 × 50 = 420 000 J. Wait — that's 420,000 J which is option B. Let me recheck: 2 × 4200 × 50 = 420,000 J."},
  {q:"Using E = mcΔT, water (c = 4200 J/kg°C), 2 kg heated from 20°C to 70°C requires:",opts:["420 000 J","168 000 J","84 000 J","210 000 J"],ans:0,exp:"E = mcΔT = 2 × 4200 × (70−20) = 2 × 4200 × 50 = 420,000 J. ΔT = 50°C."},
],
waves:[
  {q:"Which of the following is a longitudinal wave?",opts:["Light","Water surface waves","Sound","S-waves (seismic)"],ans:2,exp:"Sound is longitudinal — particles vibrate parallel to energy travel direction (compressions and rarefactions). Light and water waves are transverse."},
  {q:"A wave has frequency 200 Hz and wavelength 1.5 m. What is its speed?",opts:["133 m/s","300 m/s","201.5 m/s","0.0075 m/s"],ans:1,exp:"v = fλ = 200 × 1.5 = 300 m/s. The wave equation v = fλ is essential for this topic."},
  {q:"What happens to the frequency of a wave crossing from one medium to another?",opts:["It increases","It decreases","It stays the same","It doubles"],ans:2,exp:"Frequency is set by the source and never changes at a boundary. Only wave speed and wavelength change when crossing media."},
  {q:"What is the principle of superposition?",opts:["Waves bounce off surfaces","Waves bend around corners","Resultant displacement equals the sum of individual displacements","Waves slow in denser media"],ans:2,exp:"Superposition: when two waves overlap, the resultant displacement is the algebraic sum of their displacements. Leads to constructive and destructive interference."},
  {q:"A wave source moves towards an observer. What happens to observed frequency?",opts:["It decreases","It stays the same","It increases","It depends on amplitude"],ans:2,exp:"The Doppler effect: approaching source compresses wavefronts, increasing observed frequency. This causes blue-shift in light and higher pitch in sound."},
  {q:"Which wave type does NOT need a medium?",opts:["Sound","Seismic P-waves","Electromagnetic waves","Water waves"],ans:2,exp:"EM waves are transverse and travel through a vacuum at 3 × 10⁸ m/s. Sound and seismic waves require particles to travel through."},
  {q:"What is the relationship between frequency and period?",opts:["f = T","f = 1/T","f = T²","f = 2T"],ans:1,exp:"f = 1/T. A 0.01 s period gives 100 Hz. They are reciprocals — halving period doubles frequency."},
  {q:"What does the amplitude of a wave represent?",opts:["The number of waves per second","The distance between two peaks","The maximum displacement from the equilibrium position","The speed of the wave"],ans:2,exp:"Amplitude is the maximum displacement from the undisturbed (equilibrium) position. Greater amplitude = more energy carried by the wave."},
  {q:"Which phenomenon explains why sound can be heard around corners?",opts:["Reflection","Refraction","Diffraction","Superposition"],ans:2,exp:"Diffraction is the spreading of waves around obstacles or through gaps. It is most significant when the gap/obstacle size is similar to the wavelength."},
  {q:"A wave transfers 5 complete oscillations in 2.5 m. What is the wavelength?",opts:["0.5 m","12.5 m","2 m","0.2 m"],ans:0,exp:"λ = total length ÷ number of cycles = 2.5 ÷ 5 = 0.5 m. One complete cycle equals one wavelength."},
  {q:"What happens to the speed of light when it enters glass from air?",opts:["It increases","It stays the same","It decreases","It stops"],ans:2,exp:"Light slows when entering a denser medium (glass). This causes refraction — the change in direction. The frequency remains constant; wavelength decreases."},
  {q:"How does the wavelength of a sound wave change if frequency doubles at constant speed?",opts:["It doubles","It stays the same","It halves","It quadruples"],ans:2,exp:"v = fλ, so λ = v/f. If f doubles and v is constant, λ halves. Frequency and wavelength are inversely proportional at constant speed."},
  {q:"What is total internal reflection?",opts:["All light is absorbed at a surface","Light reflects entirely inside a medium when hitting the boundary at above the critical angle","Light passes straight through a surface","A wave doubles in amplitude"],ans:1,exp:"Total internal reflection occurs when light hits a boundary at an angle greater than the critical angle — it reflects entirely back inside the medium. Used in optical fibres."},
  {q:"Which type of seismic wave can travel through liquids?",opts:["S-waves only","P-waves only","Both P and S waves","Neither"],ans:1,exp:"P-waves (primary/compression waves) are longitudinal and travel through solids and liquids. S-waves (transverse) cannot travel through liquids — this is how we know Earth's outer core is liquid."},
  {q:"The speed of sound in air is approximately:",opts:["3 × 10⁸ m/s","330 m/s","1500 m/s","1 m/s"],ans:1,exp:"Sound travels at ~330 m/s in air. It travels faster in liquids (~1500 m/s in water) and faster still in solids. Light (3 × 10⁸ m/s) is about a million times faster."},
],
em:[
  {q:"Which part of the EM spectrum has the highest frequency?",opts:["Radio waves","Visible light","X-rays","Gamma rays"],ans:3,exp:"Gamma rays have the highest frequency (and shortest wavelength) in the EM spectrum. Higher frequency = higher energy per photon."},
  {q:"What speed do all EM waves travel at in a vacuum?",opts:["3 × 10⁸ km/s","3 × 10⁸ m/s","3 × 10⁶ m/s","330 m/s"],ans:1,exp:"All EM waves travel at 3 × 10⁸ m/s (300 million m/s) in a vacuum — the speed of light, c. They slow in other media."},
  {q:"Which EM waves are used for medical imaging of bones?",opts:["Ultraviolet","Infrared","X-rays","Microwaves"],ans:2,exp:"X-rays pass through soft tissue but are absorbed by dense bone, producing shadow images. Overexposure is dangerous as X-rays are ionising."},
  {q:"Infrared radiation is used in which everyday application?",opts:["Treating skin conditions","Cooking food evenly inside","Remote controls and thermal imaging","Sterilising surgical equipment"],ans:2,exp:"Infrared is used in TV remotes (near-IR) and thermal cameras. Microwaves cook food. UV can treat skin conditions. Gamma sterilises medical equipment."},
  {q:"Why are gamma rays more dangerous to living tissue than radio waves?",opts:["They are louder","They have greater amplitude","They are ionising and carry much higher energy","They travel faster"],ans:2,exp:"Gamma rays are ionising — high enough energy to remove electrons from atoms, damaging DNA and potentially causing cancer. Radio waves are non-ionising."},
  {q:"Which EM radiation triggers vitamin D production in skin?",opts:["Infrared","Visible light","Ultraviolet","Microwaves"],ans:2,exp:"Ultraviolet radiation triggers vitamin D synthesis in skin. However, excessive UV exposure causes sunburn and increases skin cancer risk."},
  {q:"What EM radiation is used in satellite communication and mobile phones?",opts:["Visible light","Gamma rays","X-rays","Microwaves"],ans:3,exp:"Microwaves pass through the atmosphere and carry large amounts of data — ideal for satellite links and mobile communication."},
  {q:"Which part of the EM spectrum has the longest wavelength?",opts:["Gamma rays","X-rays","Visible light","Radio waves"],ans:3,exp:"Radio waves have the longest wavelength (and lowest frequency) in the EM spectrum. Wavelength decreases as you move from radio → gamma."},
  {q:"How are X-rays and gamma rays similar?",opts:["Same source","Same wavelength","Both are ionising and part of the EM spectrum","Both are longitudinal waves"],ans:2,exp:"Both X-rays and gamma rays are high-frequency, short-wavelength, ionising EM radiation. They differ in origin: X-rays from electron deceleration, gamma from nuclear decay."},
  {q:"Which EM wave is used in optical fibres for communication?",opts:["Radio waves","Microwaves","Infrared","Gamma rays"],ans:2,exp:"Infrared light is used in optical fibres because it travels long distances with low absorption. Total internal reflection keeps the signal inside the fibre."},
  {q:"What evidence shows all EM waves are related?",opts:["They all reflect","They all travel at the same speed in a vacuum","They all have the same wavelength","They are all visible"],ans:1,exp:"All EM waves travel at 3 × 10⁸ m/s in a vacuum. This is the defining property that unites them as part of the same electromagnetic spectrum."},
  {q:"Which type of EM radiation is used in airport security scanners?",opts:["Radio waves","Microwaves","Infrared","X-rays"],ans:3,exp:"Airport body scanners use low-energy X-rays (or millimetre waves) to detect concealed objects. X-rays penetrate clothing but are absorbed or reflected by denser materials."},
  {q:"What is meant by saying a wave is 'ionising'?",opts:["It travels through a vacuum","It can remove electrons from atoms","It reflects off metal surfaces","It requires a medium"],ans:1,exp:"Ionising radiation carries enough energy to remove electrons from atoms, creating ions. This can damage living cells and DNA. Gamma, X-rays, and UV are ionising EM waves."},
  {q:"Why can radio waves diffract around hills?",opts:["Their speed is very high","Their wavelength is similar in size to large obstacles","They are longitudinal","They are not affected by gravity"],ans:1,exp:"Radio waves have wavelengths of metres to kilometres — similar in scale to hills and buildings — so they diffract significantly around obstacles, enabling reception in hilly areas."},
  {q:"Infrared cameras detect objects by:",opts:["Reflected visible light","Emitted heat radiation","Transmitted X-rays","Magnetic fields"],ans:1,exp:"All objects emit infrared radiation depending on their temperature. Infrared cameras detect this emitted heat, making them useful for night vision, heat loss surveys, and medicine."},
],
electricity:[
  {q:"What is the resistance if 12 V causes 3 A to flow?",opts:["36 Ω","4 Ω","9 Ω","0.25 Ω"],ans:1,exp:"R = V ÷ I = 12 ÷ 3 = 4 Ω. Ohm's law: V = IR, rearranged to R = V/I."},
  {q:"Two resistors of 4 Ω and 6 Ω are in series. What is the total resistance?",opts:["2.4 Ω","10 Ω","24 Ω","1 Ω"],ans:1,exp:"Series: R_total = R₁ + R₂ = 4 + 6 = 10 Ω. Current is the same everywhere in a series circuit."},
  {q:"Two 6 Ω resistors are in parallel. What is the combined resistance?",opts:["12 Ω","6 Ω","3 Ω","1 Ω"],ans:2,exp:"1/R = 1/6 + 1/6 = 2/6, so R = 3 Ω. Parallel resistance is always less than the smallest individual resistor."},
  {q:"A 60 W light bulb is on for 2 hours. How much energy does it use?",opts:["120 J","30 J","432 000 J","30 000 J"],ans:2,exp:"E = Pt = 60 × (2 × 3600) = 60 × 7200 = 432,000 J. Always convert hours to seconds."},
  {q:"What does the area under a current-time graph represent?",opts:["Power","Resistance","Charge","Energy"],ans:2,exp:"Charge (Q) = current (I) × time (t). The area under an I-t graph gives total charge in coulombs."},
  {q:"What is the key difference between AC and DC?",opts:["AC is faster","DC reverses direction; AC flows one way","AC changes direction periodically; DC flows one way","There is no difference"],ans:2,exp:"AC (alternating current) reverses direction periodically. UK mains = 50 Hz AC at 230 V. DC (direct current) always flows the same direction, e.g. from a battery."},
  {q:"Which component's resistance decreases as temperature increases?",opts:["Standard resistor","LDR","Thermistor","Diode"],ans:2,exp:"A thermistor's resistance falls with rising temperature — useful in thermostats and temperature sensors."},
  {q:"A toaster has 23 Ω resistance on a 230 V supply. What current flows?",opts:["10 A","5290 A","0.1 A","23 A"],ans:0,exp:"I = V ÷ R = 230 ÷ 23 = 10 A. A 13 A fuse is appropriate for a toaster."},
  {q:"What is the function of a fuse in a circuit?",opts:["Increase voltage","Store charge","Break the circuit if current is too high","Reduce resistance"],ans:2,exp:"A fuse contains a thin wire that melts and breaks the circuit if the current exceeds a safe level, preventing fires and equipment damage."},
  {q:"In a parallel circuit, what is the same across each branch?",opts:["Current","Resistance","Charge","Voltage"],ans:3,exp:"Voltage is the same across all branches of a parallel circuit. Current divides between branches (more through lower resistance branches)."},
  {q:"A charge of 30 C flows in 6 seconds. What is the current?",opts:["180 A","5 A","0.2 A","24 A"],ans:1,exp:"I = Q ÷ t = 30 ÷ 6 = 5 A. Current is the rate of flow of charge."},
  {q:"Which component only allows current to flow in one direction?",opts:["Resistor","Capacitor","Diode","LDR"],ans:2,exp:"A diode only conducts in one direction (forward bias). It has very high resistance in reverse bias. Used in rectifiers to convert AC to DC."},
  {q:"What colour is the live wire in a UK plug?",opts:["Blue","Green and yellow","Brown","Red"],ans:2,exp:"UK wiring: Live = Brown, Neutral = Blue, Earth = Green and yellow. The live wire carries the dangerous alternating voltage."},
  {q:"What is the power of a device that draws 3 A at 230 V?",opts:["76.7 W","690 W","233 W","2070 W"],ans:1,exp:"P = IV = 3 × 230 = 690 W. Power can also be calculated as P = I²R or P = V²/R."},
  {q:"An LDR is in a circuit in a dark room. What happens to its resistance?",opts:["Decreases","Stays the same","Increases","Drops to zero"],ans:2,exp:"An LDR (light-dependent resistor) has high resistance in the dark and low resistance in bright light. Used in automatic lighting systems."},
],
magnetism:[
  {q:"What is the direction of the magnetic field inside a solenoid?",opts:["Circular around the wire","Along the axis of the solenoid","Perpendicular to the coil","Radiating outward"],ans:1,exp:"Inside a solenoid the field is parallel to the axis — it behaves like a bar magnet. The right-hand grip rule determines which end is north."},
  {q:"If the current through a conductor in a magnetic field doubles, the force:",opts:["Halves","Stays the same","Doubles","Quadruples"],ans:2,exp:"F = BIL. Force is directly proportional to current. Doubling I doubles F (assuming B and L are constant)."},
  {q:"In Fleming's left-hand rule, the thumb represents:",opts:["Field","Current","Motion (force)","Voltage"],ans:2,exp:"FBI: First finger = Field, seCond finger = Current (I), thuMb = Motion/Force. Used for motors and conductors in magnetic fields."},
  {q:"How can you increase the EMF induced in a generator?",opts:["Weaker magnet","Slower rotation","More turns on the coil","Smaller coil"],ans:2,exp:"Induced EMF increases with: more coil turns, stronger magnet, faster rotation. All increase the rate of change of magnetic flux linkage."},
  {q:"A transformer has 100 primary turns and 500 secondary turns. Input is 12 V. Output is:",opts:["2.4 V","60 V","500 V","12 V"],ans:1,exp:"Vs/Vp = Ns/Np → Vs = 12 × (500/100) = 60 V. A step-up transformer increases voltage and proportionally decreases current."},
  {q:"Why is electricity transmitted at high voltage in the National Grid?",opts:["Increases current","Reduces energy lost as heat in cables","Makes cables cheaper","High voltage is safer"],ans:1,exp:"P_loss = I²R. High voltage → low current → much less power wasted as heat in cables. Transformers make this possible."},
  {q:"What produces a magnetic field around a current-carrying wire?",opts:["The voltage","The moving charges (current)","The resistance","The wire material"],ans:1,exp:"Moving charges (electric current) create a magnetic field. The field forms concentric circles around the wire — direction given by the right-hand grip rule."},
  {q:"A step-down transformer has 2000 primary turns and 100 secondary turns. If input is 400 V, output is:",opts:["8000 V","20 V","400 V","200 V"],ans:1,exp:"Vs = Vp × (Ns/Np) = 400 × (100/2000) = 400 × 0.05 = 20 V. This steps voltage down from 400 V to 20 V."},
  {q:"What type of current do generators produce as the coil spins?",opts:["Direct current (DC)","Alternating current (AC)","No current","Pulsed DC"],ans:1,exp:"As the coil rotates, each side of the coil alternately moves up and down through the field, reversing the induced current — producing AC."},
  {q:"Which material is attracted by a magnet but cannot itself become a permanent magnet?",opts:["Copper","Steel","Iron","Aluminium"],ans:2,exp:"Iron is a magnetically soft material — it is easily magnetised and demagnetised, and is attracted by magnets. Steel is hard and can become permanent. Copper and aluminium are non-magnetic."},
  {q:"What happens to the poles of an electromagnet if the current is reversed?",opts:["The poles stay the same","The poles swap","The magnet is demagnetised","Nothing changes"],ans:1,exp:"Reversing current reverses the direction of the magnetic field, which swaps the north and south poles of the electromagnet. This is how an AC motor reverses direction."},
  {q:"A loudspeaker works using the interaction between:",opts:["Two permanent magnets","A permanent magnet and a current-carrying coil","Two current-carrying coils","A magnet and an iron core"],ans:1,exp:"In a loudspeaker, an AC signal passes through a coil in a permanent magnetic field. The varying force causes the coil (and attached cone) to vibrate, producing sound."},
  {q:"What is electromagnetic induction?",opts:["A wire heating up when current flows","A current produced in a conductor moving through a magnetic field","A magnet attracting iron","Electrons moving through a resistor"],ans:1,exp:"Electromagnetic induction: a conductor moving relative to a magnetic field (or a changing field) induces an EMF (and current in a closed circuit). Faraday's law describes this."},
  {q:"Why must transformers use AC and not DC?",opts:["DC is too dangerous","AC is easier to generate","DC creates a constant magnetic field that produces no changing flux and no induced EMF","AC has higher voltage"],ans:2,exp:"Transformers rely on a changing magnetic flux to induce an EMF. DC creates a steady (non-changing) field, so no EMF is induced in the secondary coil. AC constantly changes, inducing a continuously varying EMF."},
  {q:"Increasing the number of turns on the secondary coil of a step-up transformer:",opts:["Decreases the output voltage","Has no effect","Increases the output voltage","Increases the input voltage"],ans:2,exp:"Vs = Vp × (Ns/Np). More secondary turns → larger Ns/Np ratio → higher output voltage. This is the principle behind step-up transformers."},
],
particle:[
  {q:"What happens to gas pressure if temperature increases at constant volume?",opts:["Pressure decreases","Pressure stays the same","Pressure increases","Volume increases"],ans:2,exp:"Higher temperature → faster particles → more frequent and harder collisions with walls → higher pressure. P ∝ T (in Kelvin) at constant volume."},
  {q:"What is the latent heat of vaporisation?",opts:["Energy to melt a solid","Energy to change liquid to gas at constant temperature","Energy released during condensation","The heat capacity of water"],ans:1,exp:"Latent heat of vaporisation: energy needed to change 1 kg of liquid to gas at constant temperature. No temperature change occurs during a change of state."},
  {q:"Why does a gas exert pressure on container walls?",opts:["Gas particles attract the walls","Gas particles have weight","Particles collide with walls, exerting a force","Particles repel each other"],ans:2,exp:"Countless particles collide with container walls each second. Each collision exerts a tiny force, and the sum creates measurable gas pressure."},
  {q:"Which state of matter has particles in fixed positions but vibrating?",opts:["Gas","Liquid","Solid","Plasma"],ans:2,exp:"In a solid, particles are held in fixed positions by strong intermolecular forces and vibrate about those positions — giving a definite shape and volume."},
  {q:"At absolute zero (0 K), gas particle kinetic energy is:",opts:["Maximum","Zero","The same as at room temperature","Unpredictable"],ans:1,exp:"At 0 K (−273°C), particles theoretically have zero kinetic energy and no motion. This is the lowest possible temperature, unachievable in practice."},
  {q:"What is the specific heat capacity of a material?",opts:["Temperature at which it melts","Energy needed to raise 1 kg by 1°C","Energy released when it freezes","Its thermal conductivity"],ans:1,exp:"Specific heat capacity (c): energy required to raise 1 kg of a substance by 1°C (1 K). E = mcΔT is the key equation."},
  {q:"What happens at the boiling point of a liquid?",opts:["Temperature rises rapidly","Particles break free from the surface only","All particles have enough energy to overcome intermolecular forces and become a gas","Density doubles"],ans:2,exp:"At boiling point, all particles have enough thermal energy to overcome intermolecular forces throughout the liquid, not just at the surface (evaporation). Temperature stays constant until change of state is complete."},
  {q:"If gas volume is halved at constant temperature, what happens to pressure?",opts:["Pressure halves","Pressure stays the same","Pressure doubles","Pressure quadruples"],ans:2,exp:"Boyle's Law: P₁V₁ = P₂V₂ at constant temperature. Halving volume doubles pressure — particles collide with walls twice as often per unit area."},
  {q:"Brownian motion is evidence for:",opts:["Waves in liquids","The particle model of matter","Electromagnetic forces","Gravity in fluids"],ans:1,exp:"Brownian motion (random movement of pollen grains/smoke particles) shows that fluids consist of tiny, fast-moving particles that collide randomly with larger visible particles."},
  {q:"Which change of state requires energy to be supplied?",opts:["Condensation","Freezing","Evaporation","Solidification"],ans:2,exp:"Evaporation (and boiling) requires energy input to overcome intermolecular forces. Condensation, freezing, and solidification all release energy."},
  {q:"How does the density of a substance change when it changes from liquid to gas?",opts:["Increases greatly","Stays the same","Decreases greatly","Doubles"],ans:2,exp:"Gas particles are much further apart than in a liquid — the same mass occupies a much greater volume, so density decreases dramatically (by a factor of about 1000 for water)."},
  {q:"What is the internal energy of a substance?",opts:["Only the kinetic energy of its particles","Only the potential energy of its particles","The sum of the kinetic and potential energies of all its particles","Its temperature in Kelvin"],ans:2,exp:"Internal energy = total KE + total PE of all particles. Heating a substance increases internal energy — either raising temperature (KE) or changing state (PE)."},
  {q:"Convert 27°C to Kelvin.",opts:["−246 K","300 K","27 K","246 K"],ans:1,exp:"K = °C + 273 = 27 + 273 = 300 K. Always convert to Kelvin when using the gas laws. 0°C = 273 K, absolute zero = 0 K = −273°C."},
  {q:"During melting, temperature stays constant because:",opts:["Heat is not being supplied","The energy goes into increasing kinetic energy","Energy is used to overcome intermolecular forces, not raise temperature","Particles stop moving"],ans:2,exp:"During a change of state, energy (latent heat) goes into breaking/forming intermolecular bonds (changing PE), not into increasing particle speed (KE). So temperature doesn't rise."},
  {q:"What is the relationship between absolute temperature and average kinetic energy of gas particles?",opts:["KE ∝ 1/T","KE ∝ T²","KE ∝ T (in Kelvin)","No relationship"],ans:2,exp:"Average KE of gas particles is directly proportional to absolute temperature (in Kelvin). Doubling T (in K) doubles average KE. This is why 0 K is absolute zero — no KE."},
],
atomic:[
  {q:"Which nuclear radiation has the greatest ionising power?",opts:["Alpha (α)","Beta (β)","Gamma (γ)","X-rays"],ans:0,exp:"Alpha is most ionising — large, slow, 2+ charge, strongly interacts with matter. Stopped by a few cm of air or a sheet of paper."},
  {q:"What is the half-life of a radioactive isotope?",opts:["Time for all atoms to decay","Time for half the atoms to decay","Time for one atom to decay","Activity divided by two"],ans:1,exp:"Half-life: time for half the radioactive nuclei to decay. After 2 half-lives ¼ remain, after 3 half-lives ⅛ remain."},
  {q:"A source has activity 800 Bq and half-life 4 days. Activity after 12 days?",opts:["400 Bq","200 Bq","100 Bq","50 Bq"],ans:2,exp:"12 days = 3 half-lives. 800 → 400 → 200 → 100 Bq. Activity halves with each half-life."},
  {q:"When a nucleus emits a beta-minus particle, atomic number:",opts:["Increases by 1","Decreases by 2","Increases by 2","Does not change"],ans:0,exp:"β⁻ decay: neutron → proton + electron. Atomic number (Z) +1, mass number unchanged. The emitted electron is the beta particle."},
  {q:"What is nuclear fission?",opts:["Two nuclei joining","A neutron becoming a proton","A heavy nucleus splitting into two smaller nuclei","An electron being emitted"],ans:2,exp:"Fission: a heavy nucleus (e.g. U-235) absorbs a neutron and splits into two smaller nuclei, releasing energy and 2–3 neutrons that can sustain a chain reaction."},
  {q:"Which particles make up the nucleus?",opts:["Protons and electrons","Neutrons and electrons","Protons and neutrons","Electrons and positrons"],ans:2,exp:"The nucleus contains protons (+) and neutrons (0 charge), collectively called nucleons. Electrons orbit in shells around the nucleus."},
  {q:"What is background radiation?",opts:["Radiation from power stations only","Radiation from the Sun only","Low-level radiation from natural and artificial sources, present everywhere","Radiation that causes no damage"],ans:2,exp:"Background radiation is always present — from radon gas, rocks (granite), cosmic rays, food, medical procedures, and some man-made sources. Most is natural."},
  {q:"Which emission has no mass and no charge?",opts:["Alpha","Beta-minus","Beta-plus","Gamma"],ans:3,exp:"Gamma rays are EM waves with zero mass and zero charge. They travel at light speed and are the most penetrating radiation — stopped only by thick lead or concrete."},
  {q:"What change occurs to the mass number during alpha decay?",opts:["Increases by 4","Decreases by 2","Decreases by 4","No change"],ans:2,exp:"Alpha decay emits a helium-4 nucleus (2 protons, 2 neutrons). Mass number decreases by 4, atomic number decreases by 2."},
  {q:"What is nuclear fusion?",opts:["A nucleus splitting in two","Two light nuclei joining to form a heavier nucleus","A neutron turning into a proton","An electron being absorbed by the nucleus"],ans:1,exp:"Fusion: two light nuclei (e.g. hydrogen isotopes) combine to form a heavier nucleus, releasing enormous energy. Powers stars including our Sun."},
  {q:"Which type of radiation is deflected most by a magnetic field?",opts:["Alpha","Beta","Gamma","All equally"],ans:1,exp:"Beta particles are fast electrons — low mass and high charge-to-mass ratio, so they deflect significantly. Alpha deflects less (heavier). Gamma is not deflected (no charge)."},
  {q:"What does the atomic (proton) number of an element tell you?",opts:["The number of neutrons","The mass of the nucleus","The number of protons in the nucleus","The number of electron shells"],ans:2,exp:"The atomic number (Z) = number of protons in the nucleus. This defines the element. In a neutral atom, Z also equals the number of electrons."},
  {q:"Carbon-14 has atomic number 6 and mass number 14. How many neutrons does it have?",opts:["14","6","8","20"],ans:2,exp:"Neutrons = mass number − atomic number = 14 − 6 = 8. Carbon-14 is a radioactive isotope used in carbon dating."},
  {q:"What is the penetrating power of gamma radiation compared to alpha?",opts:["Less penetrating","The same","Much more penetrating","Only penetrates solids"],ans:2,exp:"Gamma rays can penetrate several centimetres of lead or metres of concrete. Alpha is stopped by a few cm of air. Penetrating power: γ >> β > α."},
  {q:"Which isotope is commonly used in medical tracers because of its short half-life?",opts:["Uranium-235","Carbon-14","Technetium-99m","Radon-222"],ans:2,exp:"Technetium-99m (half-life ~6 hours) is widely used in medical imaging. Its short half-life limits patient exposure; it emits gamma rays that are detected externally."},
],
space:[
  {q:"What is a light-year?",opts:["Time for light to reach Earth from the Sun","Distance light travels in one year","A measure of star brightness","Age of the universe in years"],ans:1,exp:"A light-year is a distance: ~9.46 × 10¹⁵ m. The nearest star (Proxima Centauri) is ~4.2 light-years away."},
  {q:"What is the main sequence stage of a star?",opts:["When a star becomes a black hole","The stable period when hydrogen fuses in its core","The final stellar explosion","The cooling phase after formation"],ans:1,exp:"Main sequence is the longest, stable phase — hydrogen fuses to helium in the core. Our Sun has been on the main sequence for ~4.6 billion years."},
  {q:"What evidence shows the universe is expanding?",opts:["Stars are getting brighter","Galaxies show redshift, moving away","Background radiation is blue-shifted","The universe is getting colder"],ans:1,exp:"Distant galaxies show redshift — wavelengths stretched (red-shifted), meaning they move away. More distant = greater redshift. This is Hubble's observation."},
  {q:"Which force keeps planets in orbit around the Sun?",opts:["Electromagnetic force","Nuclear force","Friction","Gravity"],ans:3,exp:"Gravity provides the centripetal force keeping planets in elliptical orbits. The greater the distance, the weaker the gravitational pull and the slower the orbital speed."},
  {q:"What is the Big Bang theory?",opts:["Stars explode creating galaxies","Universe began from a hot, dense point and has been expanding ever since","The Sun formed from a nearby explosion","Black holes create universes"],ans:1,exp:"The Big Bang: ~13.8 billion years ago, all space, time, matter and energy emerged from an extremely hot, dense state. The universe has been expanding and cooling since."},
  {q:"What happens to a star much more massive than the Sun after main sequence?",opts:["Becomes a white dwarf","Becomes a red dwarf","Explodes as a supernova, forming a neutron star or black hole","Gently cools to a black dwarf"],ans:2,exp:"Massive stars expand to red supergiants, then explode in a supernova. Remnant: neutron star (very dense) or black hole (if mass is great enough)."},
  {q:"What is cosmic microwave background (CMB) radiation?",opts:["Radiation from active galaxies","Remnant EM radiation from the early, hot universe","Radiation from the Sun's corona","Microwaves from dark matter"],ans:1,exp:"CMB is thermal radiation from the early universe (~380,000 years post-Big Bang). It fills the universe uniformly and is strong evidence for the Big Bang."},
  {q:"What is a nebula?",opts:["A type of black hole","A cloud of gas and dust in space where stars form","A galaxy with no visible stars","A dead star's core"],ans:1,exp:"A nebula is a large cloud of gas (mainly hydrogen) and dust. Gravity causes regions to collapse and heat up, eventually forming new stars — stellar nurseries."},
  {q:"What will our Sun eventually become?",opts:["A neutron star","A black hole","A white dwarf","A supernova"],ans:2,exp:"Medium-mass stars like the Sun expand to a red giant, shed their outer layers as a planetary nebula, and leave a white dwarf — a hot, dense core that slowly cools."},
  {q:"What is a black hole?",opts:["A very cold dead star","A region of space where gravity is so strong nothing — not even light — escapes","A type of galaxy","An empty region of space"],ans:1,exp:"A black hole forms when a massive star's core collapses. Gravity is so intense that the escape velocity exceeds the speed of light — nothing can escape, including light."},
  {q:"What is the Hubble constant used for?",opts:["Measuring star temperature","Calculating the age and expansion rate of the universe","Determining the mass of planets","Measuring the brightness of galaxies"],ans:1,exp:"The Hubble constant (H₀) relates galaxy recession speed to distance (v = H₀d). It allows us to estimate the age of the universe (~13.8 billion years) and its expansion rate."},
  {q:"In what sequence does a massive star evolve?",opts:["Nebula → main sequence → white dwarf","Nebula → red giant → planetary nebula → white dwarf","Nebula → main sequence → red supergiant → supernova → neutron star/black hole","Main sequence → red dwarf → black hole"],ans:2,exp:"Massive stars: nebula → (protostar) → main sequence → red supergiant → supernova → neutron star or black hole. Medium stars end as white dwarfs."},
  {q:"Why do stars appear to twinkle?",opts:["Stars pulse their light output","Light refracts through Earth's moving atmosphere","Stars rotate rapidly","Dust in space scatters starlight"],ans:1,exp:"Starlight refracts (bends) as it passes through pockets of moving air at different temperatures in Earth's atmosphere, causing the apparent twinkling. Planets twinkle less because they subtend a larger angle."},
  {q:"What is meant by 'redshift' of a galaxy's light?",opts:["The galaxy is very hot","Light wavelengths are stretched, indicating the galaxy is moving away","The galaxy emits only red light","The galaxy is moving towards us"],ans:1,exp:"Redshift: wavelengths of light from a receding galaxy are stretched to longer (redder) values — the cosmological Doppler effect. Greater recession speed = greater redshift."},
  {q:"How does the orbital period of a planet change as its distance from the Sun increases?",opts:["Decreases","Stays the same","Increases","Doubles each AU"],ans:2,exp:"Kepler's third law: T² ∝ r³. More distant planets orbit more slowly and have longer orbital periods. Mars (further) takes ~687 Earth days; Mercury (closer) takes only ~88 days."},
],
};

const N_PER_QUIZ = 10;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function pctCol(p){ return p>=70?'#1a472a':p>=50?'#92600a':'#A32D2D'; }
function pctBg(p){ return p>=70?'#eef6ee':p>=50?'#fdf5e6':'#fdf0ec'; }
function pctBdr(p){ return p>=70?'#5a9e62':p>=50?'#e0c080':'#e8b8aa'; }

let state = {
  view:'home', topic:null, qs:[], qi:0, answered:false, chosen:null, results:[], history:{}
};

function updateBadge(){
  const done = TOPICS.filter(t=>state.history[t.id]?.done).length;
  const badge = document.getElementById('overall-badge');
  if(badge){
    badge.textContent = done + ' / ' + TOPICS.length + ' topics';
    badge.style.display = done>0?'block':'none';
  }
}

function render(){
  const app = document.getElementById('app');
  if(state.view==='home') app.innerHTML = renderHome();
  else if(state.view==='quiz') app.innerHTML = renderQuiz();
  else if(state.view==='results') app.innerHTML = renderResults();
  attach();
  updateBadge();
}

function renderHome(){
  const attempted = TOPICS.filter(t=>state.history[t.id]?.done).length;
  const scores = TOPICS.filter(t=>state.history[t.id]?.done).map(t=>state.history[t.id].pct);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
  let h = `<div class="home-hero">
    <h2>Physics revision — let's go</h2>
    <p>Select a topic below. You'll get ${N_PER_QUIZ} questions with instant feedback and revision advice.</p>
  </div>`;
  if(attempted>0){
    h+=`<div class="stats-row">
      <div class="stat-box"><div class="val">${attempted}/${TOPICS.length}</div><div class="lbl">Topics attempted</div></div>
      <div class="stat-box"><div class="val" style="color:${pctCol(avg)}">${avg}%</div><div class="lbl">Average score</div></div>
      <div class="stat-box"><div class="val">${TOPICS.length-attempted}</div><div class="lbl">Still to do</div></div>
    </div>`;
  }
  h+=`<div class="topics-section"><h3>All topics</h3><div class="topics-grid">`;
  TOPICS.forEach(t=>{
    const his = state.history[t.id];
    const n = Math.min(QB[t.id].length, N_PER_QUIZ);
    let scoreHtml='';
    if(his?.done){
      const col=pctCol(his.pct);
      scoreHtml=`<div class="topic-score-row">
        <div class="topic-score-label" style="color:${col}">${his.pct}% — ${his.pct>=70?'Strong':'Needs work'}</div>
        <div class="topic-bar"><div class="topic-bar-fill" style="width:${his.pct}%;background:${col}"></div></div>
      </div>`;
    }
    h+=`<div class="topic-card" data-topic="${t.id}">
      <div class="topic-color-bar c-${t.id}"></div>
      ${his?.done?'<div class="done-chip">Done</div>':''}
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-name">${t.name}</div>
      <div class="topic-meta">${t.sub} · ${n} questions</div>
      ${scoreHtml}
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

function startQuiz(tid){
  state.topic=tid;
  state.qs=shuffle(QB[tid]).slice(0,N_PER_QUIZ);
  state.qi=0; state.answered=false; state.chosen=null; state.results=[];
  state.view='quiz'; render();
}

function renderQuiz(){
  const q=state.qs[state.qi];
  const pct=Math.round((state.qi/state.qs.length)*100);
  const tname=TOPICS.find(t=>t.id===state.topic).name;
  let h=`<div class="quiz-nav">
    <button class="btn-back" id="back-btn">← Topics</button>
    <span class="quiz-topic-name">${tname}</span>
    <span class="quiz-prog">${state.qi+1} / ${state.qs.length}</span>
  </div>
  <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="q-card">
    <div class="q-label">Question ${state.qi+1} of ${state.qs.length}</div>
    <div class="q-text">${q.q}</div>
  </div>
  <div class="options">`;
  q.opts.forEach((o,i)=>{
    let cls='opt';
    if(state.answered){
      if(i===q.ans) cls+=' reveal-correct';
      else if(i===state.chosen) cls+=' wrong';
    }
    h+=`<button class="${cls}" data-opt="${i}" ${state.answered?'disabled':''}>
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>
      <span>${o}</span>
    </button>`;
  });
  h+=`</div>`;
  if(state.answered){
    const ok=state.chosen===q.ans;
    h+=`<div class="feedback ${ok?'ok':'no'}">
      <div class="feedback-head">${ok?'Correct':'Incorrect'}</div>
      <div>${q.exp}</div>
    </div>
    <button class="btn-next" id="next-btn">${state.qi===state.qs.length-1?'See results →':'Next question →'}</button>`;
  }
  return h;
}

function renderResults(){
  const total=state.results.length;
  const correct=state.results.filter(r=>r.correct).length;
  const pct=Math.round((correct/total)*100);
  const col=pctCol(pct), bg=pctBg(pct), bdr=pctBdr(pct);
  const tname=TOPICS.find(t=>t.id===state.topic).name;
  let msg,adv,acls;
  if(pct>=80){msg='Excellent work!';adv='You have a strong grasp of '+tname+'. Focus your revision time on weaker topics. Consider practising past paper questions to refine your exam technique.';acls='great';}
  else if(pct>=60){msg='Good effort!';adv='You understand the basics of '+tname+' but there are some gaps. Review the questions you got wrong, re-read your class notes on those areas, and attempt the quiz again.';acls='ok';}
  else if(pct>=40){msg='Keep working at it.';adv='There are significant gaps in your understanding of '+tname+'. Re-read your textbook or CGP guide on this topic carefully, then attempt the quiz again.';acls='low';}
  else{msg='This topic needs real attention.';adv=tname+' should be a priority revision area. Go back to the start of the topic in your notes, watch revision videos (e.g. Physics Online / FreeScienceLessons), then return to this quiz.';acls='low';}

  const wrong=state.results.filter(r=>!r.correct);
  let h=`<div class="quiz-nav">
    <button class="btn-back" id="back-btn">← Topics</button>
    <span class="quiz-topic-name">${tname} — Results</span>
  </div>
  <div class="results-hero">
    <div class="score-ring" style="border-color:${col}">
      <span class="pct" style="color:${col}">${pct}%</span>
      <span class="of">${correct} / ${total}</span>
    </div>
    <h2>${msg}</h2>
    <p>${correct} correct out of ${total} questions</p>
  </div>
  <div class="advice-box ${acls}">
    <div class="advice-head">Revision advice</div>
    <div>${adv}</div>
  </div>`;

  if(wrong.length>0){
    h+=`<p class="section-head">Areas to focus on in ${tname}:</p>
    <div class="breakdown-card">
      <div class="breakdown-card-head">Questions answered incorrectly</div>`;
    wrong.forEach(r=>{
      h+=`<div class="bq">
        <div class="bq-dot w">✗</div>
        <div>
          <div class="bq-q">${r.q}</div>
          <div class="bq-ans">Correct answer: ${String.fromCharCode(65+r.ans)}. ${r.opts[r.ans]}</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<p class="section-head">Full question breakdown</p>
  <div class="breakdown-card">
    <div class="breakdown-card-head">All ${total} questions</div>`;
  state.results.forEach(r=>{
    h+=`<div class="bq">
      <div class="bq-dot ${r.correct?'c':'w'}">${r.correct?'✓':'✗'}</div>
      <div>
        <div class="bq-q">${r.q}</div>
        ${!r.correct?`<div class="bq-ans">Correct: ${String.fromCharCode(65+r.ans)}. ${r.opts[r.ans]}</div>`:''}
      </div>
    </div>`;
  });
  h+=`</div>
  <div class="action-row">
    <button class="btn-primary" id="retry-btn">Retry this topic</button>
    <button class="btn-secondary" id="back-btn2">All topics</button>
  </div>`;
  return h;
}

function attach(){
  document.querySelectorAll('.topic-card').forEach(c=>{
    c.addEventListener('click',()=>startQuiz(c.dataset.topic));
  });
  const back=document.getElementById('back-btn');
  if(back) back.addEventListener('click',()=>{state.view='home';render();});
  const back2=document.getElementById('back-btn2');
  if(back2) back2.addEventListener('click',()=>{state.view='home';render();});
  const retry=document.getElementById('retry-btn');
  if(retry) retry.addEventListener('click',()=>startQuiz(state.topic));
  document.querySelectorAll('[data-opt]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.answered) return;
      const i=parseInt(btn.dataset.opt);
      state.chosen=i; state.answered=true;
      const q=state.qs[state.qi];
      state.results.push({q:q.q,opts:q.opts,ans:q.ans,correct:i===q.ans});
      render();
    });
  });
  const next=document.getElementById('next-btn');
  if(next) next.addEventListener('click',()=>{
    if(state.qi<state.qs.length-1){
      state.qi++; state.answered=false; state.chosen=null; render();
    } else {
      const pct=Math.round((state.results.filter(r=>r.correct).length/state.results.length)*100);
      state.history[state.topic]={done:true,pct,wrong:state.results.filter(r=>!r.correct).map(r=>r.q)};
      state.view='results'; render();
    }
  });
}

render();
</script>
</body>
</html>
